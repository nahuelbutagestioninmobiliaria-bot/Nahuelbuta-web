<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;family=Inter:wght@500&amp;display=swap');
      .logo-name { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 700; fill: #ffffff; letter-spacing: -1px; }
      .logo-sub { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; fill: #ffffff; text-transform: uppercase; letter-spacing: 4px; }
    </style>
  </defs>
  
  <!-- Logo Name: Nahuelbuta -->
  <text x="50" y="65" class="logo-name">Nahuelbuta</text>
  
  <!-- Logo Sub: Gestión Inmobiliaria -->
  <text x="52" y="95" class="logo-sub">Gestión Inmobiliaria</text>
  
  <!-- Optional: Subtle details in silver/white if desired, but here all white is best for print/darkbg -->
</svg>
