<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;family=Inter:wght@500&amp;display=swap');
      .logo-name { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 700; fill: #080e09; letter-spacing: -1px; }
      .logo-sub { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; fill: #080e09; text-transform: uppercase; letter-spacing: 4px; }
      .accent { fill: #8fbc6a; }
      .gold { fill: #c9a84c; }
    </style>
  </defs>
  
  <!-- Logo Name: Nahuelbuta -->
  <text x="50" y="65" class="logo-name">
    <tspan class="accent">N</tspan><tspan>ahuelbuta</tspan>
  </text>
  
  <!-- Gold Dot on N -->
  <circle cx="48" cy="62" r="3" class="gold" opacity="0.8"/>
  
  <!-- Roof on 'a' -->
  <!-- Positioned above the 'a' which starts roughly at x=88 (N ~38px, a starts nearby) -->
  <path d="M89 32L98 23L107 32" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Logo Sub: Gestión Inmobiliaria -->
  <text x="52" y="95" class="logo-sub">Gestión Inmobiliaria</text>
</svg>
